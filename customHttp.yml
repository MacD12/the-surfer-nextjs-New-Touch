customHeaders:
  - pattern: '/videos/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.(jpg|jpeg|png|gif|webp|avif|svg|ico)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '**/*.(woff|woff2|ttf|otf|eot)'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_next/static/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_next/image/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=2678400'
